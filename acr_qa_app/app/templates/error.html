{% extends "base.html" %}

{% block content %}
  <div class="card" style="max-width: 760px; margin: 40px auto;">
    <h2 style="margin-top: 0;">{{ title or "Error" }}</h2>
    <p style="color: var(--muted); line-height: 1.6;">{{ message }}</p>
    <div style="margin-top: 16px; display:flex; gap:10px;">
      <a class="btn" href="{{ url_for('main.dashboard') }}">Back to dashboard</a>
    </div>
  </div>
{% endblock %}
